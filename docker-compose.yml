# ==============================================================================
# Common configuration shared across all Airflow services
# ==============================================================================
x-airflow-common:
  &airflow-common
  # image: apache/airflow:2.8.1  # Removed so Docker uses your custom Dockerfile
  build: .                       # Builds the custom image (with Java for PySpark)
  env_file:
    - .env  # Load environment variables (secrets) securely from the .env file
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  volumes:
    - ./dags:/opt/airflow/dags       # Map local DAGs folder to the container
    - ./scripts:/opt/airflow/scripts # Map local Python scripts folder
    - ./logs:/opt/airflow/logs       # Map logs for easier debugging
    - ./sql:/opt/airflow/sql         # Map SQLs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ==============================================================================
  # Database (PostgreSQL) - Required for Airflow metadata
  # ==============================================================================
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # ==============================================================================
  # Airflow Webserver - The UI accessible via browser
  # ==============================================================================
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "2626:8080" # Accessible at http://localhost:2626
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  # ==============================================================================
  # Airflow Scheduler - The brain that triggers the tasks
  # ==============================================================================
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  # ==============================================================================
  # Airflow Init - Runs once to initialize the DB and create the Admin user
  # ==============================================================================
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin # Default UI username
      _AIRFLOW_WWW_USER_PASSWORD: admin # Default UI password
